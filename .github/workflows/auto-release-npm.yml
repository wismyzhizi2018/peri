name: Auto Release npm

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  auto-release:
    # 仅 CI 成功且是 push 事件（排除 PR）时触发
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # 获取当前 npm 版本
          CURRENT=$(node -p "require('./npm/package.json').version")
          echo "Current npm version: ${CURRENT}"

          # 解析 major.minor.patch 并 bump patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Next version: ${NEXT}"
          echo "version=${NEXT}" >> $GITHUB_OUTPUT

          # 检查 tag 是否已存在（避免重复发布）
          if git rev-parse "npm-v${NEXT}" >/dev/null 2>&1; then
            echo "Tag npm-v${NEXT} already exists, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump npm package.json version
        if: steps.version.outputs.skip != 'true'
        run: |
          cd npm
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Commit version bump
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add npm/package.json
          git commit -m "chore: bump npm version to ${{ steps.version.outputs.version }}"
          git push

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag "npm-v${{ steps.version.outputs.version }}"
          git push origin "npm-v${{ steps.version.outputs.version }}"
