name: Release npm

on:
  push:
    tags:
      - "npm-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            ext: ".exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#npm-v}"
          fi
          echo "Setting version to ${VERSION}"
          sed -i.bak -e "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-build-
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross

      - name: Build peri-tui (Linux)
        if: runner.os == 'Linux'
        run: cross build -p peri-tui --release --target ${{ matrix.target }}

      - name: Build peri-tui (non-Linux)
        if: runner.os != 'Linux'
        run: cargo build -p peri-tui --release --target ${{ matrix.target }}

      - name: Package binaries (Unix)
        if: matrix.ext == ''
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/peri dist/peri-${{ matrix.platform }}
          chmod +x dist/peri-${{ matrix.platform }}
          tar -czf dist/peri-${{ matrix.platform }}.tar.gz -C dist peri-${{ matrix.platform }}
          rm dist/peri-${{ matrix.platform }}

      - name: Package binaries (Windows)
        if: matrix.ext == '.exe'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/peri.exe" "dist/peri-${{ matrix.platform }}.exe"
          Compress-Archive -Path "dist/peri-${{ matrix.platform }}.exe" -DestinationPath "dist/peri-${{ matrix.platform }}.zip"
          Remove-Item "dist/peri-${{ matrix.platform }}.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: dist/
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#npm-v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create tag (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git rev-parse "npm-v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag npm-v${{ steps.version.outputs.version }} already exists, skipping creation"
          else
            git tag "npm-v${{ steps.version.outputs.version }}"
            git push origin "npm-v${{ steps.version.outputs.version }}"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "npm-v${{ steps.version.outputs.version }}"
          files: |
            artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-alpha') || contains(steps.version.outputs.version, '-beta') || contains(steps.version.outputs.version, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          

      - name: Set npm version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#npm-v}"
          fi
          cd npm
          npm version "${VERSION}" --no-git-tag-version

      - name: Publish to npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
