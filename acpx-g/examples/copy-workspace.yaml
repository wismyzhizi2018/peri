# 复制目录到唯一 workspace
# 用法: acpx-g --workflow-dir examples/ --with copyDir=/path/to/source
#
# 通过 $ACPX_OUTPUT 动态输出 workdir，下游通过
# {{ needs.copy.outputs.workdir }} 引用。

name: copy-workspace
version: "1.0"
description: "Copy input directory to a unique workspace"

inputs:
  copyDir:
    type: string
    required: true
  outputDir:
    type: string
    default: "./workspace"

defaults:
  retry: 1
  timeout: 300

nodes:
  - id: copy
    type: shell
    run: |
      WORKSPACE="{{ inputs.outputDir }}/$(uuidgen | tr '[:upper:]' '[:lower:]')"
      mkdir -p "$(dirname "$WORKSPACE")"
      cp -r {{ inputs.copyDir }} "$WORKSPACE"
      echo "workdir=$WORKSPACE" >> "$ACPX_OUTPUT"
