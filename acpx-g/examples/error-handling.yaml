name: error-handling-demo
version: "1.0"
description: |
  Demonstrates retry, timeout, continue_on_error, and conditional execution.
  Useful for learning how to make workflows resilient to failures.

inputs:
  deploy_env:
    type: string
    default: staging

defaults:
  retry: 0
  timeout: 60

nodes:
  # Step 1: Checkout — retry up to 2 times for flaky networks
  - id: checkout
    type: shell
    retry: 2
    run: |
      echo "Checking out code..."
      echo "repo_dir=$PWD/repo" >> $ACPX_OUTPUT

  # Step 2: Build — with a 30-second timeout
  - id: build
    type: shell
    depends: [checkout]
    timeout: 30
    run: |
      echo "Building project..."
      sleep 0.1
      echo "artifact=./dist/app.tar.gz" >> $ACPX_OUTPUT

  # Step 3: Test — continues even if tests fail
  - id: test
    type: shell
    depends: [build]
    continue_on_error: true
    run: |
      echo "Running tests..."
      echo "result=pass" >> $ACPX_OUTPUT

  # Step 4: Deploy — only runs when deploy_env is "production"
  - id: deploy-prod
    type: shell
    if: "{{ inputs.deploy_env }} == production"
    depends: [test]
    run: |
      echo "Deploying to production..."

  # Step 5: Notify — always runs, even when deploy is skipped
  - id: notify
    type: shell
    depends: [test]
    run: |
      echo "Sending notification for {{ inputs.deploy_env }}..."
