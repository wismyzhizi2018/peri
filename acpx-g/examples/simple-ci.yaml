# 简单 CI Pipeline：引用 setup.yml + agent 审查
# 用法: acpx-g --workflow-dir examples/

name: simple-ci
version: "1.0"
description: "simple test for reference and agent node"

references:
    setup: "./setup.yml"
    copy-workspace: "./copy-workspace.yaml"

defaults:
    retry: 1
    timeout: 120

# env:
#     RUST_BACKTRACE: "1"

nodes:
    # 引用 setup 子 workflow（包含 shell_test 节点）
    # 展开后生成: do-setup/shell_test
    - id: do-setup
      type: reference
      ref: setup

    # 复制目录，agent 在复制的 workspace 中执行
    # 展开后生成: copy-workspace/copy
    - id: copy-workspace
      type: reference
      ref: copy-workspace
      with:
          copyDir: "./.tmp"
          outputDir: "./workspace"
      depends:
          - do-setup

    # Agent: 直接引用 copy-workspace 的 workdir 输出
    - id: agent-run
      type: agent
      prompt: "使用 bash cwd 一下"
      agent: opencode
      cwd: "{{ needs.copy-workspace.outputs.workdir }}"
      depends:
          - copy-workspace
