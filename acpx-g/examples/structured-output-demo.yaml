# Demo: Agent 结构化 JSON 输出
# 展示 output_schema 的三种用法——内联对象、引用文件、无 schema 传统模式

name: structured-output-demo
version: "1.0"
description: "Agent structured JSON output demo"

defaults:
  retry: 0
  timeout: 120

nodes:
  # ─── 1. Shell 准备输入数据 ─────────────────────────────
  - id: prepare
    type: shell
    run: |
      echo 'https://github.com/rust-lang/rust/pull/12345' > /tmp/demo-pr-url.txt
      echo 'A comprehensive PR that adds async trait support across the standard library' > /tmp/demo-pr-body.txt
    outputs:
      pr_url_file: "/tmp/demo-pr-url.txt"
      pr_body_file: "/tmp/demo-pr-body.txt"

  # ─── 2. Agent: 内联 schema ─────────────────────────────
  # output_schema 直接写在 YAML 里，约束 LLM 返回指定结构的 JSON
  - id: analyze-pr
    type: agent
    prompt: |
      分析以下 PR 信息，返回结构化评估结果。

      PR URL: $(cat {{ needs.prepare.outputs.pr_url_file }})
      PR 描述: $(cat {{ needs.prepare.outputs.pr_body_file }})

      请评估这个 PR 的：
      - 风险等级（low / medium / high）
      - 是否需要人工审查
      - 建议的测试策略
      - 摘要（一句话）
    output_schema:
      type: object
      properties:
        risk_level:
          type: string
          enum: [low, medium, high]
        needs_human_review:
          type: boolean
        test_strategy:
          type: string
        summary:
          type: string
      required: [risk_level, needs_human_review, test_strategy, summary]
    depends: [prepare]
    model: sonnet

  # ─── 3. 根据风险评估决定是否继续 ──────────────────────
  - id: approve
    type: shell
    run: |
      echo "PR approved: {{ needs.analyze-pr.outputs.summary }}"
    if: "{{ needs.analyze-pr.outputs.risk_level }} != high"
    depends: [analyze-pr]

  # ─── 4. Agent: 引用外部 schema 文件 ────────────────────
  # output_schema 通过 file 字段引用外部 JSON Schema 文件
  - id: generate-report
    type: agent
    prompt: |
      根据以下 PR 分析结果生成报告：

      风险等级: {{ needs.analyze-pr.outputs.risk_level }}
      需要人工审查: {{ needs.analyze-pr.outputs.needs_human_review }}
      测试策略: {{ needs.analyze-pr.outputs.test_strategy }}
      摘要: {{ needs.analyze-pr.outputs.summary }}

      请生成一份完整的 PR 审查报告。
    output_schema:
      file: "./schemas/pr-report.json"
    depends: [analyze-pr]
    model: sonnet

  # ─── 5. 使用 Agent 输出 ──────────────────────────────
  - id: notify
    type: shell
    run: |
      echo "=== PR Review Report ==="
      echo "Title:       {{ needs.generate-report.outputs.title }}"
      echo "Sections:    {{ needs.generate-report.outputs.sections }}"
      echo "Verdict:     {{ needs.generate-report.outputs.verdict }}"
      echo "Score:       {{ needs.generate-report.outputs.score }}"
    depends: [generate-report]
